<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS — Inter-Galactic Coordination Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <pre id="fatal"></pre>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('error', function (e) {
        var el = document.getElementById('fatal');
        el.style.display = 'block';
        el.textContent = 'TRANSMISSION FAILED — runtime fault\n\n' + (e.error ? (e.error.stack || e.error.message) : e.message);
      });
    </script>
  </body>
